name: A basic Artifact 2

on:
    workflow_dispatch:

jobs:
    job_1:
        name: Upload artifacts
        runs-on: ubuntu-latest
        steps:
            - name: Create file
              run: echo "Hello, This is my demo artifacts. First file will be created, then uploaded and then downloaded" > artifact.txt

            - uses: actions/upload-artifact@v4
              with:
                name: artifacts
                path: artifact.txt
    
    job_2:
        name: Download artifact
        runs-on: ubuntu-latest
        needs: job_1
        steps:
            - name: Download artifact
              run: | 
                echo "Downloaded"
            - uses: actions/download-artifact@v4
              with:    
                name: artifacts
            - run: cat artifact.txt
            
